name: generate pacman animation

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: generate pacman
        uses: Platane/snk@v3
        with:
          github_user_name: joaogabrieloliveiralopes
          outputs: |
            dist/pacman.svg

      - name: push pacman
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: main
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
