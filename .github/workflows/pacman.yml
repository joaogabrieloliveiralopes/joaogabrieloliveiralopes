name: Generate Pac-Man Animation

on:
  schedule:
    - cron: "0 0 * * *"    # roda todo dia à meia-noite
  workflow_dispatch:       # permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Pega o código do repositório
      - uses: actions/checkout@v3

      # 2️⃣ Gera a animação do Pac-Man
      - name: Generate Pac-Man
        uses: Platane/snk@v3
        with:
          github_user_name: joaogabrieloliveiralopes
          outputs: |
            dist/pacman.svg

      # 3️⃣ Faz push do arquivo gerado para a branch 'output'
      - name: Push Pac-Man
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
